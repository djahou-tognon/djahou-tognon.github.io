<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Researcher</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body data-page="home" data-page-title="meta.siteTitle">
  <header class="site-header" id="site-header"></header>
  <main>
    <section class="profile-bar" id="profile-bar-root"></section>
    <section class="hero" id="hero-root" hidden></section>
    <section class="section about-section" id="about">
      <div class="container">
        <h2 class="section-title" data-i18n="about.title">About</h2>
        <div class="prose" id="about-root"></div>
        <div id="announcement-about-root"></div>
      </div>
    </section>
    <section class="section section-alt home-info-section" id="contact">
      <div class="container">
        <div class="home-info-grid">
          <div class="home-info-col home-keywords-col">
            <div id="keywords-root"></div>
          </div>
          <div class="home-info-col home-contact-col">
            <h2 class="section-title" data-i18n="contact.title">Contact</h2>
            <div id="contact-root"></div>
          </div>
        </div>
        <div id="announcement-contact-root"></div>
      </div>
    </section>
  </main>
  <footer class="site-footer" id="site-footer"></footer>
  <script src="js/i18n.js?v=4"></script>
  <script src="js/site.js?v=4"></script>
</body>
</html>
